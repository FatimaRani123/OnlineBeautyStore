{% extends 'core/base.html' %}
{% block content %}
<h4>Current orders</h4>
<table class="table">
  <thead><tr><th>ID</th><th>Customer</th><th>Email</th><th>Placed</th><th>Status</th></tr></thead>
  <tbody>
    {% for o in orders %}
      <tr>
        <td>{{ o.id }}</td>
        <td>{{ o.customer_name }}</td>
        <td>{{ o.email }}</td>
        <td>{{ o.placed_at }}</td>
        <td>{{ o.status }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No current orders.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
